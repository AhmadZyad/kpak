<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>کوڕی پاک | Kuri Pak</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
:root{ --primary:#1b6b5e; --primary-light:rgba(27,107,94,.12); --bg-body:#eef0eb; --bg-surface:#ffffff; --text-main:#141814; --text-muted:#5e6b68; --border-color:#d8d4c8; --radius:18px; --font-family:'IBM Plex Sans Arabic',sans-serif; --shadow-sm:0 2px 8px rgba(0,0,0,.07); --shadow-md:0 6px 28px rgba(0,0,0,.13);}
body.dark{ --primary:#3dada0; --bg-body:#080e0c; --bg-surface:#0f1a17; --text-main:#deeae8; --text-muted:#7a9490; --border-color:#1e3030;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-family);background:var(--bg-body);color:var(--text-main);min-height:100vh;display:flex;flex-direction:column; transition:0.3s;}
a{text-decoration:none;color:inherit;}
.header{position:sticky;top:0;background:var(--bg-surface);height:64px;z-index:1000;border-bottom:1px solid var(--border-color);box-shadow:var(--shadow-sm);}
.header-inner{display:flex;align-items:center;justify-content:space-between;height:100%;padding:0 16px;max-width:1100px;margin:0 auto;}
.site-title{font-size:20px;font-weight:800;color:var(--text-main);} .site-title span{color:var(--primary);}
.icon-btn{font-size:19px;color:var(--text-main);width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:none;border:none;cursor:pointer;}
.icon-btn:hover{background:var(--primary-light);color:var(--primary);}
.search-container{position:relative; display:flex; align-items:center; background:var(--bg-body); border:1px solid var(--border-color); border-radius:20px; padding:5px 15px;}
.search-container input{border:none; background:transparent; outline:none; padding:5px; color:var(--text-main); font-family:var(--font-family); width:200px;}
.kp-suggestions{position:absolute; top:100%; left:0; right:0; background:var(--bg-surface); border-radius:10px; box-shadow:var(--shadow-md); display:none; max-height:300px; overflow-y:auto; z-index:2000; border:1px solid var(--border-color); margin-top:5px;}
.kp-suggestions.open{display:block;}
.kp-sugg-item{display:flex; gap:10px; padding:10px; border-bottom:1px solid var(--border-color);}
.kp-sugg-item:hover{background:var(--primary-light);}
.kp-sugg-thumb{width:60px; height:40px; border-radius:5px; object-fit:cover;}
.kp-sugg-title{font-size:13px; font-weight:600;}
.container{max-width:1100px;margin:20px auto;padding:0 16px;width:100%; flex:1;}
.post-list-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));gap:20px;}
.post-card-item{background:var(--bg-surface);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border-color);display:flex;flex-direction:column; box-shadow:var(--shadow-sm); transition:0.3s;}
.post-card-item:hover{transform:translateY(-5px);box-shadow:var(--shadow-md); border-color:var(--primary);}
.post-card-thumb{position:relative;width:100%;padding-top:56.25%;background:#000;}
.post-card-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.play-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;}
.play-btn-circle{width:50px;height:50px;background:rgba(255,255,255,0.9);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--primary);font-size:20px;}
.card-label-badge{position:absolute;top:10px;right:10px;background:var(--primary);color:#fff;font-size:11px;padding:3px 10px;border-radius:15px; font-weight:bold;}
.post-card-info{padding:15px; flex:1; display:flex; flex-direction:column;}
.post-card-title{font-size:15px;font-weight:700;color:var(--text-main);line-height:1.6;}
.footer-section{background:var(--bg-surface);padding:30px;text-align:center;border-top:1px solid var(--border-color);margin-top:40px;}
</style>
<!-- استدعاء ملف قاعدة البيانات -->
<script src="data.js"></script>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="header-right">
      <a class="site-title" href="index.html">کوڕی <span>پاک</span></a>
    </div>
    <div class="header-left">
      <div class="search-container">
        <i class="fa-solid fa-magnifying-glass" style="color:var(--text-muted)"></i>
        <input type="text" id="searchInput" placeholder="گەڕان بۆ ڤیدیۆ...">
        <div class="kp-suggestions" id="searchResults"></div>
      </div>
      <button class="icon-btn" id="dark-toggle" onclick="toggleTheme()"><i class="fa-solid fa-moon"></i></button>
    </div>
  </div>
</header>

<div class="container">
    <div class="post-list-grid" id="videoGrid"></div>
</div>

<footer class="footer-section">
  <div class="site-title">کوڕی <span>پاک</span></div>
  <p style="font-size:13px; color:var(--text-muted); margin-top:10px;">سەرجەم مافەکان پارێزراوە © 2024</p>
</footer>

<script>
// عرض الفيديوهات من ملف data.js
function renderVideos(videos) {
    const grid = document.getElementById('videoGrid');
    grid.innerHTML = ''; 
    videos.forEach(video => {
        grid.innerHTML += `
            <a class="post-card-item" href="video.html?id=${video.id}">
                <div class="post-card-thumb">
                    <img src="${video.thumb}" alt="${video.title}">
                    <div class="play-overlay"><div class="play-btn-circle"><i class="fa-solid fa-play"></i></div></div>
                    <span class="card-label-badge">${video.category}</span>
                </div>
                <div class="post-card-info">
                    <h3 class="post-card-title">${video.title}</h3>
                </div>
            </a>
        `;
    });
}
renderVideos(VIDEO_DATABASE);

// محرك البحث
document.getElementById('searchInput').addEventListener('input', function() {
    const query = this.value.toLowerCase().trim();
    const results = document.getElementById('searchResults');
    results.innerHTML = '';
    if(query.length < 2) { results.classList.remove('open'); return; }
    
    const filtered = VIDEO_DATABASE.filter(v => v.title.toLowerCase().includes(query));
    if(filtered.length === 0) {
        results.innerHTML = '<div style="padding:15px; text-align:center;">هیچ بابەتێک نەدۆزرایەوە</div>';
    } else {
        filtered.forEach(v => {
            results.innerHTML += `<a href="video.html?id=${v.id}" class="kp-sugg-item"><img src="${v.thumb}" class="kp-sugg-thumb"><div><div class="kp-sugg-title">${v.title}</div></div></a>`;
        });
    }
    results.classList.add('open');
});
document.addEventListener('click', (e) => { if(!e.target.closest('.search-container')) document.getElementById('searchResults').classList.remove('open'); });

// الوضع الليلي
function toggleTheme() {
    document.body.classList.toggle('dark');
    localStorage.setItem('kp_dark_mode', document.body.classList.contains('dark') ? 'yes' : 'no');
    document.querySelector('#dark-toggle i').className = document.body.classList.contains('dark') ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
}
if(localStorage.getItem('kp_dark_mode') === 'yes') { toggleTheme(); }
</script>
</body>
</html>
