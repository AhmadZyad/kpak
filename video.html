<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پەخشی ڤیدیۆ | Kuri Pak</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
:root{ --primary:#1b6b5e; --primary-light:rgba(27,107,94,.12); --bg-body:#eef0eb; --bg-surface:#ffffff; --text-main:#141814; --text-muted:#5e6b68; --border-color:#d8d4c8; --radius:18px; --font-family:'IBM Plex Sans Arabic',sans-serif; --shadow-sm:0 2px 8px rgba(0,0,0,.07); --shadow-md:0 6px 28px rgba(0,0,0,.13);}
body.dark{ --primary:#3dada0; --bg-body:#080e0c; --bg-surface:#0f1a17; --text-main:#deeae8; --text-muted:#7a9490; --border-color:#1e3030;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-family);background:var(--bg-body);color:var(--text-main);min-height:100vh;display:flex;flex-direction:column; transition:0.3s;}
a{text-decoration:none;color:inherit;}
.header{position:sticky;top:0;background:var(--bg-surface);height:64px;z-index:1000;border-bottom:1px solid var(--border-color);box-shadow:var(--shadow-sm);}
.header-inner{display:flex;align-items:center;justify-content:space-between;height:100%;padding:0 16px;max-width:1100px;margin:0 auto;}
.site-title{font-size:20px;font-weight:800;color:var(--text-main);} .site-title span{color:var(--primary);}
.icon-btn{font-size:19px;color:var(--text-main);width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:none;border:none;cursor:pointer;}
.icon-btn:hover{background:var(--primary-light);color:var(--primary);}
.container{max-width:1100px;margin:20px auto;padding:0 16px;width:100%; flex:1; display:flex; gap:20px; flex-wrap:wrap;}
.main-content{flex:1; min-width:65%;}
.sidebar{width:320px;}
@media (max-width: 800px) { .container { flex-direction: column; } .sidebar { width: 100%; } }
.video-player-container{position:relative;width:100%;padding-top:56.25%;background:#000;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-md);}
.video-player-container iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;outline:none;}
.video-info{background:var(--bg-surface); border:1px solid var(--border-color); border-radius:var(--radius); padding:20px; margin-top:20px; box-shadow:var(--shadow-sm);}
.v-title{font-size:22px; font-weight:700; margin-bottom:10px;}
.v-meta{font-size:13px; color:var(--text-muted); margin-bottom:15px; padding-bottom:15px; border-bottom:1px solid var(--border-color);}
.related-title{font-size:16px; font-weight:700; margin-bottom:15px; border-bottom:2px solid var(--primary); padding-bottom:10px; display:inline-block;}
.related-list{display:flex; flex-direction:column; gap:15px;}
.rel-item{display:flex; gap:10px; background:var(--bg-surface); border:1px solid var(--border-color); border-radius:10px; overflow:hidden;}
.rel-thumb{width:120px; height:70px; background:#000; flex-shrink:0;}
.rel-thumb img{width:100%; height:100%; object-fit:cover;}
.rel-info{padding:10px 5px; flex:1;}
.rel-title{font-size:13px; font-weight:600;}
.footer-section{background:var(--bg-surface);padding:30px;text-align:center;border-top:1px solid var(--border-color);margin-top:40px;}
</style>
<!-- استدعاء ملف قاعدة البيانات -->
<script src="data.js"></script>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="header-right">
      <a class="site-title" href="index.html">کوڕی <span>پاک</span></a>
    </div>
    <div class="header-left">
      <a href="index.html" class="icon-btn"><i class="fa-solid fa-home"></i></a>
      <button class="icon-btn" id="dark-toggle" onclick="toggleTheme()"><i class="fa-solid fa-moon"></i></button>
    </div>
  </div>
</header>

<div class="container">
    <div class="main-content" id="mainVideoArea"></div>
    <div class="sidebar">
        <h3 class="related-title">ڤیدیۆکانی تر</h3>
        <div class="related-list" id="relatedVideos"></div>
    </div>
</div>

<footer class="footer-section">
  <div class="site-title">کوڕی <span>پاک</span></div>
  <p style="font-size:13px; color:var(--text-muted); margin-top:10px;">سەرجەم مافەکان پارێزراوە © 2024</p>
</footer>

<script>
const urlParams = new URLSearchParams(window.location.search);
const videoId = parseInt(urlParams.get('id'));
const currentVideo = VIDEO_DATABASE.find(v => v.id === videoId);

const mainArea = document.getElementById('mainVideoArea');
if(currentVideo) {
    mainArea.innerHTML = `
        <div class="video-player-container">
<iframe src="${currentVideo.videoSrc}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>        </div>
        <div class="video-info">
            <h1 class="v-title">${currentVideo.title}</h1>
            <div class="v-meta"><i class="fa-solid fa-tag"></i> ${currentVideo.category}</div>
            <div style="color:var(--text-muted);">${currentVideo.description}</div>
        </div>
    `;
    document.title = currentVideo.title + " | Kuri Pak";
} else {
    mainArea.innerHTML = `<div class="video-info" style="text-align:center;"><h2>ببوورە، ئەم ڤیدیۆیە نەدۆزرایەوە!</h2><a href="index.html">گەڕانەوە</a></div>`;
}

// عرض الفيديوهات الجانبية
const sidebar = document.getElementById('relatedVideos');
const related = VIDEO_DATABASE.filter(v => v.id !== videoId).slice(0, 6);
related.forEach(v => {
    sidebar.innerHTML += `
        <a href="video.html?id=${v.id}" class="rel-item">
            <div class="rel-thumb"><img src="${v.thumb}" alt="${v.title}"></div>
            <div class="rel-info"><div class="rel-title">${v.title}</div></div>
        </a>
    `;
});

// الوضع الليلي
function toggleTheme() {
    document.body.classList.toggle('dark');
    localStorage.setItem('kp_dark_mode', document.body.classList.contains('dark') ? 'yes' : 'no');
    document.querySelector('#dark-toggle i').className = document.body.classList.contains('dark') ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
}
if(localStorage.getItem('kp_dark_mode') === 'yes') { toggleTheme(); }
</script>
</body>
</html>
