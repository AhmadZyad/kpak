<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پەخشی ڤیدیۆ | Kuri Pak</title>

<!-- الخطوط والأيقونات -->
<link href="https://fonts.googleapis.com" rel="preconnect">
<link crossorigin="anonymous" href="https://fonts.gstatic.com" rel="preconnect">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
/* ------------------------------------------------------------------
   المتغيرات الأساسية (نفس تصميم الصفحة الرئيسية)
------------------------------------------------------------------ */
:root{
--primary:#1b6b5e;--primary-hover:#0f4a3f;--primary-light:rgba(27,107,94,.12);
--bg-body:#eef0eb;--bg-surface:#ffffff;--bg-hover:#e8ebe2;
--text-main:#141814;--text-muted:#5e6b68;
--border-color:#d8d4c8;
--radius:18px;
--font-family:'IBM Plex Sans Arabic',sans-serif;
--shadow-sm:0 2px 8px rgba(0,0,0,.07);
--shadow-md:0 6px 28px rgba(0,0,0,.13);
--header-h:64px;
--transition:.22s cubic-bezier(.4,0,.2,1);
--glass-bg:rgba(255,255,255,.72);
--glass-border:rgba(255,255,255,.55);
}
body.dark{
--primary:#3dada0;--primary-hover:#2e8a80;--primary-light:rgba(61,173,160,.15);
--bg-body:#080e0c;--bg-surface:#0f1a17;--bg-hover:#172320;
--text-main:#deeae8;--text-muted:#7a9490;
--border-color:#1e3030;
--glass-bg:rgba(15,26,23,.82);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--font-family);background:var(--bg-body);color:var(--text-main);line-height:1.75;transition:background var(--transition),color var(--transition);min-height:100vh;display:flex;flex-direction:column;}
a{text-decoration:none;color:inherit;}
button{cursor:pointer;outline:none; border:none; background:transparent;}

/* الهيدر */
.header{position:sticky;top:0;background:var(--glass-bg);backdrop-filter:blur(28px);height:var(--header-h);z-index:1000;border-bottom:1px solid var(--glass-border);box-shadow:var(--shadow-sm);}
.header-inner{display:flex;align-items:center;justify-content:space-between;height:100%;padding:0 16px;}
.site-title{font-size:20px;font-weight:800;color:var(--text-main);}
.site-title span{color:var(--primary);}
.icon-btn{font-size:19px;color:var(--text-main);width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:var(--transition); background:var(--bg-surface); border:1px solid var(--border-color);}
.icon-btn:hover{background:var(--primary-light);color:var(--primary);}

/* تخطيط صفحة الفيديو */
.container{max-width:1100px;margin:20px auto;padding:0 16px;width:100%; flex:1; display:flex; gap:20px; flex-wrap:wrap;}
.main-content{flex:1; min-width:65%;}
.sidebar{width:320px;}

@media (max-width: 800px) {
  .container { flex-direction: column; }
  .sidebar { width: 100%; }
}

/* مشغل الفيديو المجاوب (16:9) */
.video-player-container{position:relative;width:100%;padding-top:56.25%;background:#000;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-md);}
.video-player-container iframe, .video-player-container video{position:absolute;top:0;left:0;width:100%;height:100%;border:none;outline:none;}

/* تفاصيل الفيديو */
.video-info{background:var(--bg-surface); border:1px solid var(--border-color); border-radius:var(--radius); padding:20px; margin-top:20px; box-shadow:var(--shadow-sm);}
.v-title{font-size:22px; font-weight:700; color:var(--text-main); margin-bottom:10px; line-height:1.5;}
.v-meta{display:flex; gap:15px; font-size:13px; color:var(--text-muted); margin-bottom:15px; padding-bottom:15px; border-bottom:1px solid var(--border-color);}
.v-meta span i{color:var(--primary); margin-left:5px;}
.v-desc{font-size:15px; color:var(--text-muted); line-height:1.8; white-space:pre-wrap;}

/* القائمة الجانبية (فيديوهات أخرى) */
.related-title{font-size:16px; font-weight:700; margin-bottom:15px; border-bottom:2px solid var(--primary); padding-bottom:10px; display:inline-block;}
.related-list{display:flex; flex-direction:column; gap:15px;}
.rel-item{display:flex; gap:10px; background:var(--bg-surface); border:1px solid var(--border-color); border-radius:10px; overflow:hidden; transition:var(--transition); box-shadow:var(--shadow-sm);}
.rel-item:hover{transform:translateY(-3px); border-color:var(--primary);}
.rel-thumb{width:120px; height:70px; position:relative; background:#000; flex-shrink:0;}
.rel-thumb img{width:100%; height:100%; object-fit:cover;}
.rel-info{padding:10px 5px; flex:1;}
.rel-title{font-size:13px; font-weight:600; color:var(--text-main); line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;}

/* الفوتر */
.footer-section{background:var(--bg-surface);padding:30px;text-align:center;border-top:1px solid var(--border-color);margin-top:40px;}
</style>
</head>
<body>

<!-- الهيدر -->
<header class="header">
  <div class="header-inner">
    <div class="header-right">
      <a class="site-title" href="index.html">کوڕی <span>پاک</span></a>
    </div>
    <div class="header-left">
      <!-- زر الرجوع للصفحة الرئيسية -->
      <a href="index.html" class="icon-btn" title="گەڕانەوە"><i class="fa-solid fa-home"></i></a>
      <!-- زر الوضع الليلي -->
      <button class="icon-btn" id="dark-toggle" onclick="toggleTheme()"><i class="fa-solid fa-moon"></i></button>
    </div>
  </div>
</header>

<div id="content-wrapper">
  <div class="container">
    
    <!-- قسم الفيديو الرئيسي -->
    <div class="main-content" id="mainVideoArea">
        <!-- سيتم توليد المشغل والتفاصيل هنا عبر جافاسكربت -->
    </div>

    <!-- قسم الفيديوهات ذات الصلة -->
    <div class="sidebar">
        <h3 class="related-title">ڤیدیۆکانی تر</h3>
        <div class="related-list" id="relatedVideos">
            <!-- سيتم توليد الفيديوهات هنا -->
        </div>
    </div>

  </div>
</div>

<!-- الفوتر -->
<footer class="footer-section">
  <div class="site-title">کوڕی <span>پاک</span></div>
  <p style="font-size:13px; color:var(--text-muted); margin-top:10px;">سەرجەم مافەکان پارێزراوە © 2024</p>
</footer>

<script>
// 1. قاعدة البيانات المحلية (نفسها الموجودة في index.html)
// ملاحظة هامة: يجب أن تكون قاعدة البيانات متطابقة في كلا الملفين.
const VIDEO_DATABASE = [
    {
        id: 1,
        title: "وتارى هەینی (١٦) : بۆ لەسەر دینا ئیهانەمان دەکەن ؟!",
        category: "وتاری هەینی",
        date: "25/04/2026",
        thumb: "https://lh3.googleusercontent.com/blogger_img_proxy/AEn0k_tSHnBtu42Ey0OZjIExC8g5H-KNrtqp5t9pqHTJf_l8LQ-y5NXNo8M2ia_cKjgW3309ZbplMxXStKAWZsiI-1qd_9422I2xcrgYzBSOwTxoG5hn1ypvbxjgDnfmMWi3fyAg9oZOFjDEwlnY5Y-c-8THuj1K1uRywVUl_GToLURvtzxMjm8PTN8Xa7gHLXBKtBvddFC0WBetBM7TOvspOKYZtQI_yIxhUynEic8emnPDLmUxZgBXNzzxQlz2=w1280-h720-p-k-no-nu",
        // هنا تضع رابط الفيديو المباشر (MP4) أو تضمين (يوتيوب)
        videoSrc: "https://www.youtube.com/embed/dQw4w9WgXcQ", 
        description: "لەم وانەڤیدیۆییەدا، مامۆستا کوڕی پاک باس لە هۆکارەکانی سووکایەتیکردن و ئیهانەکردنی موسڵمانان دەکات لەسەر دینەکەیان..."
    },
    {
        id: 2,
        title: "وتاری هەینی (١٥) : ژن و مێرد ئاگاداربن ماڵ هەڵوەشایەوە",
        category: "وتاری هەینی",
        date: "18/04/2026",
        thumb: "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg90Sw4LZV65h570gGXLMAP35fdnYn804YQHNs4CC8nh4QeNnXxMIsRNOgftzKSH7HduDZk9mcqWdJSPKl9Eaq0CXgX7NNq76UiQqMsuwGs4Z8ew2SvrCyKRoy8hQeB7AV4LwHwTW5pD8hqyqf5rNeqBURs_kGE_u8QECVJqD4DycoT9gaxVp7OizdTrVpw/w1280-h720-p-k-no-nu/1000311645.png",
        videoSrc: "https://test-videos.co.uk/vids/bigbuckbunny/mp4/h264/720/Big_Buck_Bunny_720_10s_1MB.mp4", // مثال على رابط MP4 مباشر
        description: "لەم وانەڤیدیۆییەدا، مامۆستا کوڕی پاک باس لە یەکێک لە مەترسیدارترین کێشەکانی کۆمەڵگەی ئەمڕۆ دەکات کە ئەویش هەڵوەشانەوەی خێزانە..."
    },
    {
        id: 3,
        title: "وتاری هەینی (١٤) : زەنگی مەترسی دوای تێکچونی پەیوەندیە کۆمەڵایەتیەکان",
        category: "ئامۆژگاری",
        date: "11/04/2026",
        thumb: "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhtUSrDWnM5h8-yI_3TfUf1IsuOyAIXBst0HWFLUoyznuEi1zKCQ83e65lNznJpyVfC3I7HaoWKK_4OsGe0sJzT3penr2h_csu7l2eKlcLYSpEIDK5AR01qhLGAlZNiV3ZIt5_2pARhdt3FoB72e2PY3rRaqdcUfIvmzsW5NzoFzuffEXiclzvb12RL19kI/w1280-h720-p-k-no-nu/IMG_20260411_145745969.jpg",
        videoSrc: "https://www.youtube.com/embed/tgbNymZ7vqY",
        description: "زەنگی مەترسی دوای تێکچونی پەیوەندیە کۆمەڵایەتیەکان..."
    }
];

// 2. استخراج الـ ID من الرابط
const urlParams = new URLSearchParams(window.location.search);
const videoId = parseInt(urlParams.get('id'));

// البحث عن الفيديو في قاعدة البيانات
const currentVideo = VIDEO_DATABASE.find(v => v.id === videoId);

const mainArea = document.getElementById('mainVideoArea');

if(currentVideo) {
    // تحديد نوع المشغل (يوتيوب أم MP4 مباشر)
    let playerHtml = '';
    if(currentVideo.videoSrc.includes('youtube.com') || currentVideo.videoSrc.includes('youtu.be')) {
        playerHtml = `<iframe src="${currentVideo.videoSrc}" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
    } else {
        playerHtml = `<video controls autoplay poster="${currentVideo.thumb}">
                        <source src="${currentVideo.videoSrc}" type="video/mp4">
                      </video>`;
    }

    // بناء واجهة الفيديو
    mainArea.innerHTML = `
        <div class="video-player-container">
            ${playerHtml}
        </div>
        <div class="video-info">
            <h1 class="v-title">${currentVideo.title}</h1>
            <div class="v-meta">
                <span><i class="fa-solid fa-calendar"></i> ${currentVideo.date}</span>
                <span><i class="fa-solid fa-tag"></i> ${currentVideo.category}</span>
            </div>
            <div class="v-desc">${currentVideo.description}</div>
        </div>
    `;

    // تغيير عنوان الصفحة للمتصفح
    document.title = currentVideo.title + " | Kuri Pak";

} else {
    // إذا كان الرابط خطأ أو لا يوجد ID
    mainArea.innerHTML = `
        <div class="video-info" style="text-align:center; padding:50px;">
            <i class="fa-solid fa-triangle-exclamation" style="font-size:40px; color:var(--text-muted); margin-bottom:15px;"></i>
            <h1 class="v-title">ببوورە، ئەم ڤیدیۆیە نەدۆزرایەوە!</h1>
            <a href="index.html" style="display:inline-block; margin-top:20px; padding:10px 20px; background:var(--primary); color:#fff; border-radius:10px;">گەڕانەوە بۆ پەڕەی سەرەکی</a>
        </div>
    `;
}

// 3. بناء الفيديوهات الجانبية (Related Videos)
const sidebar = document.getElementById('relatedVideos');
// نستثني الفيديو الحالي من القائمة الجانبية، ونأخذ 5 فيديوهات عشوائية/أخيرة
const related = VIDEO_DATABASE.filter(v => v.id !== videoId).slice(0, 5);

related.forEach(v => {
    sidebar.innerHTML += `
        <a href="video.html?id=${v.id}" class="rel-item">
            <div class="rel-thumb"><img src="${v.thumb}" alt="${v.title}"></div>
            <div class="rel-info">
                <div class="rel-title">${v.title}</div>
            </div>
        </a>
    `;
});

// 4. نظام الوضع الليلي (مشاركة نفس الوضع مع الصفحة الرئيسية)
function toggleTheme() {
    document.body.classList.toggle('dark');
    const isDark = document.body.classList.contains('dark');
    localStorage.setItem('kp_dark_mode', isDark ? 'yes' : 'no');
    
    const icon = document.querySelector('#dark-toggle i');
    icon.className = isDark ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
}

if(localStorage.getItem('kp_dark_mode') === 'yes') {
    document.body.classList.add('dark');
    document.querySelector('#dark-toggle i').className = 'fa-solid fa-sun';
}
</script>
</body>
</html>
